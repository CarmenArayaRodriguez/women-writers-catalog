<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4d6/512.png" type="image/png">
    <title>Detalle de la Obra</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-simple">
        <a href="index.html">← Volver al catálogo</a>
    </nav>
    
    <main class="detail-container">
        <article class="detail-content">
            <div class="detail-image">
                <img id="book-cover" src="" alt="Portada del libro">
            </div>
            
            <section class="detail-text">
                <h1 id="book-title">Cargando datos...</h1>
                <h2 id="book-author"></h2>
                
                <div class="divider"></div>
                
                <div class="synopsis" id="book-synopsis">
                    </div>

                <div class="book-meta">
                    <p><strong>Editorial:</strong> <span id="book-publisher"></span></p>
                    <p><strong>Año:</strong> <span id="book-year"></span></p>
                    <p><strong>Género:</strong> <span id="book-genre"></span></p>
                    <p><strong>País:</strong> <span id="book-country"></span></p>
                </div>
            </section>
        </article>
    </main>
    
    <footer class="main-footer">
        <p>&copy; 2026 - Programación Web | Catálogo de Escritoras Latinoamericanas</p>
    </footer>

    <script src="detail-script.js"></script>
</body>
</html>
