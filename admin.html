<!DOCTYPE html>
<html lang="es">
<head>
    <script>
        if (!localStorage.getItem('token')) {
            window.location.href = 'login.html';
        }
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4d6/512.png" type="image/png">
    <title>Panel de Administración - Catálogo de Escritoras Latinoamericanas</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-simple" role="navigation">
        <a href="index.html" aria-label="Volver a la página principal del catálogo">← Volver al catálogo público</a>
    </nav>

    <main class="form-container-main">
        
        <div class="form-card" role="region" aria-labelledby="form-title">
            <h1 id="form-title">Gestión de Obras</h1>
            <p class="form-subtitle">Administración de la colección digital.</p>
            
            <form id="book-form" enctype="multipart/form-data" aria-describedby="form-title">
                <input type="hidden" id="book-id">

                <div class="form-group">
                    <label for="title">Título de la obra</label>
                    <input type="text" id="title" placeholder="Ej: La casa de los espíritus" required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="author_select">Seleccionar Autora</label>
                    <div class="author-controls-row">
                        <select id="author_select" class="select-main" required aria-required="true">
                            <option value="">Cargando autoras...</option>
                        </select>
                        <button type="button" onclick="toggleNewAuthorForm()" class="btn-tool" aria-label="Registrar nueva autora">+ Nueva</button>
                        <button type="button" onclick="loadAuthorDataForEdit()" class="btn-tool" aria-label="Editar autora seleccionada">Editar</button>
                    </div>
                </div>

                <div id="new-author-section" class="author-mini-form" role="group" aria-labelledby="author-section-title" style="display: none;">
                    <h3 id="author-section-title">Datos de la Autora</h3>
                    <input type="hidden" id="edit-author-id">
                    
                    <div class="form-grid">
                        <div class="form-group">
                            <label for="new-author-first-name">Nombre</label>
                            <input type="text" id="new-author-first-name" placeholder="Nombre">
                        </div>
                        <div class="form-group">
                            <label for="new-author-last-name">Apellido</label>
                            <input type="text" id="new-author-last-name" placeholder="Apellido">
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="new-author-country">País de origen</label>
                        <input type="text" id="new-author-country" placeholder="Ej: Chile">
                    </div>

                    <div class="form-group">
                        <label for="new-author-bio">Biografía</label>
                        <textarea id="new-author-bio" placeholder="Breve reseña biográfica..."></textarea>
                    </div>    
                    
                    <button type="button" onclick="saveAuthor()" class="btn-author-save">Guardar Datos de Autora</button>
                </div>

                <div class="form-group">
                    <label for="short_description">Reseña Corta</label>
                    <input type="text" id="short_description" placeholder="Resumen breve para la tarjeta..." required aria-required="true">
                </div>

                <div class="form-group">
                    <label for="synopsis">Sinopsis</label>
                    <textarea id="synopsis" rows="4" placeholder="Resumen detallado de la obra..."></textarea>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="publisher">Editorial</label>
                        <input type="text" id="publisher" placeholder="Editorial">
                    </div>
                    <div class="form-group">
                        <label for="year">Año de publicación</label>
                        <input type="number" id="year" placeholder="Ej: 1982">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="form-group">
                        <label for="genre">Género</label>
                        <input type="text" id="genre" placeholder="Ej: Novela">
                    </div>
                    <div class="form-group">
                        <label for="cover_file">Imagen de Portada</label>
                        <input type="file" id="cover_file" accept="image/*" aria-label="Subir imagen de portada">
                    </div>
                </div>

                <div class="button-group-row">
                    <button type="submit" class="btn-save" id="btn-submit">Guardar Libro</button>
                    <button type="button" id="btn-cancel" onclick="resetBookForm()" style="display: none;" aria-label="Cancelar edición">
                        Cancelar Edición
                    </button>
                </div>
            </form>
        </div>

        <div class="form-card" role="region" aria-label="Listado de libros registrados">
            <h2>Libros en la Colección</h2>
            <div class="table-container">
                <table aria-label="Tabla de gestión de libros">
                    <thead>
                        <tr>
                            <th scope="col">Portada</th>
                            <th scope="col">Título</th>
                            <th scope="col">Autora</th>
                            <th scope="col">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-body">
                        </tbody>
                </table>
            </div>
        </div>

    </main>

    <footer class="main-footer" role="contentinfo">
        <p>&copy; 2026 - Programación Web | Catálogo de Escritoras Latinoamericanas</p>
        <a href="#" id="linkLogout" class="nav-admin" aria-label="Cerrar sesión">Cerrar Sesión</a>
    </footer>

    <script src="admin-script.js"></script>
</body>
</html>
