<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://fonts.gstatic.com/s/e/notoemoji/latest/1f4d6/512.png" type="image/png">
    <title>Login - Gestión Administrativa</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <nav class="nav-simple" role="navigation">
        <a href="index.html" aria-label="Volver al catálogo público de libros">← Volver al catálogo público</a>
    </nav>
    <main class="login-container">
        <article class="login-card">
            <h1>Acceso Administrativo</h1>
            <p>Identifíquese para gestionar la colección digital.</p>
            
            <form id="login-form" aria-label="Formulario de inicio de sesión">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" required aria-required="true" placeholder="admin@admin.com">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required aria-required="true" placeholder="••••••••">
                </div>
                <button type="submit" class="btn-login" aria-label="Validar credenciales">Entrar</button>
            </form>
            
            <div id="login-error" class="error-msg" role="alert" aria-live="polite"></div>
            
            
        </article>
    </main>

    <script src="login-script.js"></script>
</body>
</html>
